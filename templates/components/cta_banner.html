<!-- CTA Banner Component -->
<div class="cta-banner">
    <!-- Badge -->
    <div class="cta-badge d-inline-flex align-items-center gap-2">
        <span>👋</span>
        Rejoignez-nous
    </div>

    <!-- Title -->
    <h2 class="cta-title">
        Prêt à commencer votre aventure manga ?
    </h2>

    <!-- Description -->
    <p class="cta-description">
        Créez un compte gratuit et accédez à des milliers de chapitres, suivez vos mangas préférés et rejoignez notre
        communauté.
    </p>

    <!-- Action Buttons -->
    <div class="cta-buttons d-flex justify-content-center flex-wrap gap-3">
        <a href="{% url 'register' %}" class="cta-btn-primary d-inline-flex align-items-center gap-2">
            Créer un compte gratuit
        </a>

        <a href="{% url 'catalog:index' %}" class="cta-btn-secondary d-inline-flex align-items-center gap-2">
            Explorer le catalogue
        </a>
    </div>
</div>
