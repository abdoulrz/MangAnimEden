<!-- Footer Component -->
<footer class="footer">
    <div class="container">
        <div class="footer-content d-flex justify-content-between align-items-center flex-wrap gap-4">
            <!-- Left: Brand -->
            <div>
                <div class="gradient-text footer-brand-text">MangAnimEDen</div>
                <p class="footer-copyright">Made with ❤️ © 2026</p>
            </div>

            <!-- Middle: Quote (JS-driven from wisdom.json) -->
            <div id="wisdom-container" class="footer-quote-container" style="transition: opacity 0.3s ease;">
                {% if RANDOM_QUOTE %}
                <p class="footer-quote-text">"{{ RANDOM_QUOTE.text }}"</p>
                <span class="footer-quote-author">— {{ RANDOM_QUOTE.author }}</span>
                {% endif %}
            </div>

            <!-- Right: Links -->
            <div class="footer-links d-flex gap-4 flex-wrap">
                <a href="{% url 'catalog:index' %}" class="footer-link">Catalogue</a>
                <a href="{% url 'terms' %}" class="footer-link">Conditions (CGU)</a>
                <a href="{% url 'privacy' %}" class="footer-link">Confidentialité</a>
                <a href="{% url 'contact' %}" class="footer-link">Contact</a>
                <a href="{% url 'about' %}" class="footer-link">A propos</a>
            </div>
        </div>
    </div>
</footer>
