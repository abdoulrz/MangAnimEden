# Nginx Configuration for serving Media and Static files on Contabo VPS

# Add these blocks inside your 'server { ... }' block in /etc/nginx/sites-available/your_site

# Serve Media files (Manga scans, covers, etc.)
# Configuration Nginx pour servir les fichiers média localement
# À ajouter dans votre bloc 'server' sur le VPS (ex: /etc/nginx/sites-available/manganimeden)

location /media/ {
    # REMPLACEZ ce chemin par le chemin ABSOLU de votre dossier media sur le VPS
    # Utilisez la commande 'pwd' dans le dossier media pour le trouver.
    alias /home/manganimeden/MangaAnimEden/media/; 
    
    expires 30d;
    add_header Cache-Control "public, no-transform";
    access_log off; # Optionnel : désactive les logs pour les images pour économiser de l'espace log
}

location /static/ {
    alias /home/manganimeden/MangaAnimEden/staticfiles/;
    expires 30d;
    add_header Cache-Control "public, no-transform";
    access_log off;
}
